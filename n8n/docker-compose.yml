services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto
      - N8N_RUNNERS_ENABLED=false
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Rome}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - default

volumes:
  n8n_data:

networks:
  default:
    name: n8n_default
