name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create release with zip
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Moodle plugin zip
        run: |
          mkdir -p /tmp/vektra
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            . /tmp/vektra/
          cd /tmp && zip -r vektra.zip vektra/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/vektra.zip
          generate_release_notes: true
