services:
  mariadb:
    image: mariadb:10.11
    container_name: vektra-moodle-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-moodle_root}
      MYSQL_DATABASE: ${DB_NAME:-moodle}
      MYSQL_USER: ${DB_USER:-moodleuser}
      MYSQL_PASSWORD: ${DB_PASS:-moodlepass}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:${MARIADB_PORT:-10306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  moodle:
    build: .
    container_name: vektra-moodle
    ports:
      - "127.0.0.1:${MOODLE_PORT:-10180}:80"
    environment:
      # Solo-dev default points at the loopback host port so a fresh
      # `docker compose up` is browser-reachable without /etc/hosts edits.
      # When using the n8n ingestion stack, override with
      # MOODLE_URL=http://vektra-moodle in `.env` and add
      # `127.0.0.1 vektra-moodle` to /etc/hosts so n8n (inside Docker)
      # and the browser (on the host) resolve to the same name.
      MOODLE_URL: "${MOODLE_URL:-http://localhost:${MOODLE_PORT:-10180}}"
      DB_HOST: mariadb
      DB_NAME: ${DB_NAME:-moodle}
      DB_USER: ${DB_USER:-moodleuser}
      DB_PASS: ${DB_PASS:-moodlepass}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-Admin123!}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      N8N_WS_TOKEN: "${N8N_WS_TOKEN:-}"
    volumes:
      - moodle_data:/var/moodledata
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ../:/var/www/html/public/blocks/vektra:ro
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
  moodle_data:
